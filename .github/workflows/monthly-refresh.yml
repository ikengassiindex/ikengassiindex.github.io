name: Monthly Intelligence Refresh
on:
  schedule:
    # Second Thursday of each month at 10:00 UTC
    - cron: '0 10 8-14 * 4'
  workflow_dispatch:
    inputs:
      force_edition:
        description: 'Force a specific edition number (leave empty for auto-increment)'
        required: false
        type: string
      skip_archive:
        description: 'Skip PDF archival and email (true/false)'
        required: false
        default: 'false'
        type: string

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── Step 1: Archive previous edition as PDF + email ──
      - name: Install Playwright for PDF capture
        if: ${{ github.event.inputs.skip_archive != 'true' }}
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Archive previous edition (PDF + email)
        if: ${{ github.event.inputs.skip_archive != 'true' }}
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          ARCHIVE_EMAIL: ssi_index@ikenga.eu
        run: python3 scripts/archive-and-email.py

      # ── Step 2: Update edition config ──
      - name: Update edition config
        run: python3 scripts/update-edition.py

      - name: Override edition if forced
        if: ${{ github.event.inputs.force_edition != '' }}
        run: |
          python3 -c "
          import json
          with open('intelligence/edition-config.json', 'r') as f:
              config = json.load(f)
          config['current_edition'] = int('${{ github.event.inputs.force_edition }}')
          with open('intelligence/edition-config.json', 'w') as f:
              json.dump(config, f, indent=2, ensure_ascii=False)
              f.write('\n')
          print(f'Edition forced to {config[\"current_edition\"]:03d}')
          "

      # ── Step 3: Cache-bust and commit ──
      - name: Cache-bust intelligence assets
        run: |
          STAMP=$(date +%s)
          for country in france italy uk us germany spain switzerland austria; do
            if [ -f "${country}/intelligence.html" ]; then
              sed -i "s|intelligence-loader\.js?v=[0-9]*|intelligence-loader.js?v=${STAMP}|g" "${country}/intelligence.html"
            fi
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            EDITION=$(python3 -c "import json; print(json.load(open('intelligence/edition-config.json'))['current_edition'])")
            git commit -m "chore: monthly intelligence refresh — Edition $(printf '%03d' $EDITION) [$(date +%Y-%m-%d)]"
            git push
          fi
