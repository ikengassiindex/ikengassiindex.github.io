<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="SSI Index v4.0.2 — Map Explorer for Japan. Interactive map of 6,003 substations across Japan's 47 prefectures, colour-coded by risk band.">
<meta name="theme-color" content="#941914">
<meta property="og:title" content="SSI Index — Map Explorer">
<meta property="og:description" content="Interactive map of Japan's 6,003 substations with SSI risk scoring.">
<meta property="og:type" content="website">
<title>SSI Index — Map Explorer</title>
<link rel="stylesheet" href="../style.css?v=3">
</head>
<body>
<script src="../nav.js?v=116"></script>
<script src="../ssi-engine.js"></script>
<script src="ssi-metadata.js?v=2"></script>
<script src="../map.js?v=43"></script>
<script>renderNav('map');</script>

<main class="page-shell">
  <div class="page-header animate-in">
    <h1>Map Explorer</h1>
    <p>Interactive map of 6,003 substations across Japan's transmission and distribution grid — colour-coded by SSI risk band. Filter by band, prefecture, voltage, or component score.</p>
  </div>

  <!-- Filters -->
  <div class="card animate-in delay-1" style="margin-bottom:16px">
    <div style="display:flex;flex-wrap:wrap;gap:12px;align-items:end">
      <div>
        <label style="font-size:11px;color:var(--warm-grey);display:block;margin-bottom:4px">Band</label>
        <select id="filter-band" style="padding:6px 10px;border:1px solid var(--cream-deep);border-radius:4px;font-size:12px">
          <option value="">All Bands</option>
          <option value="Low">Low</option>
          <option value="Medium">Medium</option>
          <option value="High">High</option>
          <option value="Critical">Critical</option>
        </select>
      </div>
      <div>
        <label style="font-size:11px;color:var(--warm-grey);display:block;margin-bottom:4px">Prefecture</label>
        <select id="filter-region" style="padding:6px 10px;border:1px solid var(--cream-deep);border-radius:4px;font-size:12px">
          <option value="">All Prefectures</option>
        </select>
      </div>
      <div>
        <label style="font-size:11px;color:var(--warm-grey);display:block;margin-bottom:4px">Voltage</label>
        <select id="filter-voltage" style="padding:6px 10px;border:1px solid var(--cream-deep);border-radius:4px;font-size:12px">
          <option value="">All Voltages</option>
          <option value="ehv">EHV (≥225 kV)</option>
          <option value="hv">HV (63–150 kV)</option>
          <option value="mv">MV (&lt;63 kV)</option>
        </select>
      </div>
      <div>
        <label style="font-size:11px;color:var(--warm-grey);display:block;margin-bottom:4px">Colour By</label>
        <select id="filter-component" style="padding:6px 10px;border:1px solid var(--cream-deep);border-radius:4px;font-size:12px">
          <option value="score">Overall SSI Score</option>
          <option value="C_raw">Continuity (C)</option>
          <option value="V_raw">Voltage Quality (V)</option>
          <option value="I_raw">Infrastructure (I)</option>
          <option value="E_raw">Economic (E)</option>
          <option value="S_raw">Societal (S)</option>
          <option value="T_raw">Temporal (T)</option>
        </select>
      </div>
      <div>
        <label style="font-size:11px;color:var(--warm-grey);display:block;margin-bottom:4px">Search</label>
        <input id="filter-search" type="text" placeholder="Substation name..." style="padding:6px 10px;border:1px solid var(--cream-deep);border-radius:4px;font-size:12px;width:160px">
      </div>
    </div>
  </div>

  <!-- Map Canvas -->
  <div style="position:relative">
    <canvas id="ssi-map-canvas" width="1200" height="800" style="width:100%;border-radius:8px;background:#faf8f5;cursor:grab"></canvas>
    <div id="map-tooltip" style="display:none;position:absolute;pointer-events:none;background:rgba(255,255,255,0.96);border:1px solid var(--cream-deep);border-radius:6px;padding:10px 14px;font-size:12px;box-shadow:0 2px 8px rgba(0,0,0,0.1);max-width:260px;z-index:10"></div>

    <!-- Map Controls -->
    <div style="position:absolute;top:12px;right:12px;display:flex;flex-direction:column;gap:4px">
      <button id="zoomIn" style="width:32px;height:32px;border:1px solid var(--cream-deep);border-radius:4px;background:#fff;cursor:pointer;font-size:16px;font-weight:bold">+</button>
      <button id="zoomOut" style="width:32px;height:32px;border:1px solid var(--cream-deep);border-radius:4px;background:#fff;cursor:pointer;font-size:16px;font-weight:bold">−</button>
      <button id="zoomFit" style="width:32px;height:32px;border:1px solid var(--cream-deep);border-radius:4px;background:#fff;cursor:pointer;font-size:11px;font-weight:bold">Fit</button>
    </div>
  </div>

  <!-- Stats Bar -->
  <div class="card animate-in" style="margin-top:16px;margin-bottom:16px">
    <div id="map-stats" style="font-size:12px;color:var(--slate)">Loading map data...</div>
  </div>

  <!-- Detail Panel -->
  <div id="detail-panel" class="card" style="display:none;margin-bottom:24px">
    <div class="card-header">Substation Detail</div>
    <div id="detail-content" style="font-size:12px"></div>
  </div>
</main>

<script>
  // Populate prefecture filter from metadata
  var meta = window.SSI_METADATA;
  if (meta && meta.japan && meta.japan.prefectures) {
    var sel = document.getElementById('filter-region');
    meta.japan.prefectures.forEach(function(p) {
      sel.add(new Option(p.name, p.name));
    });
  }

  // Map rendering: load ssi-data.json and grid-geo.json
  // The shared map.js handles the canvas rendering if available
  // Fallback: simple dot map using lat/lon from data

  var _allSubs = [];
  var _mapState = { zoom: 1, panX: 0, panY: 0, dragging: false, lastX: 0, lastY: 0 };

  function bandColor(band) {
    return band === 'Critical' ? '#8e1b23' : band === 'High' ? '#e74c3c' : band === 'Medium' ? '#f39c12' : '#27ae60';
  }

  function scoreColor(val) {
    if (val < 0.25) return '#27ae60';
    if (val < 0.50) return '#f39c12';
    if (val < 0.75) return '#e74c3c';
    return '#8e1b23';
  }

  function renderMap() {
    var canvas = document.getElementById('ssi-map-canvas');
    if (!canvas || !canvas.getContext) return;
    var ctx = canvas.getContext('2d');
    var W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#faf8f5';
    ctx.fillRect(0, 0, W, H);

    if (_allSubs.length === 0) return;

    // Filters
    var bandF = document.getElementById('filter-band').value;
    var regionF = document.getElementById('filter-region').value;
    var voltF = document.getElementById('filter-voltage').value;
    var compF = document.getElementById('filter-component').value;
    var searchF = (document.getElementById('filter-search').value || '').toLowerCase();

    var filtered = _allSubs.filter(function(s) {
      if (bandF && s.band !== bandF) return false;
      if (regionF && (s.prefecture || s.region) !== regionF) return false;
      if (voltF === 'ehv' && s.voltage_kv < 225) return false;
      if (voltF === 'hv' && (s.voltage_kv < 63 || s.voltage_kv >= 225)) return false;
      if (voltF === 'mv' && s.voltage_kv >= 63) return false;
      if (searchF && (s.name || '').toLowerCase().indexOf(searchF) < 0) return false;
      return true;
    });

    // Stats
    var low = filtered.filter(function(s){return s.band==='Low';}).length;
    var med = filtered.filter(function(s){return s.band==='Medium';}).length;
    var high = filtered.filter(function(s){return s.band==='High';}).length;
    var crit = filtered.filter(function(s){return s.band==='Critical';}).length;
    document.getElementById('map-stats').innerHTML = '<strong>' + filtered.length.toLocaleString() + '</strong> of ' + _allSubs.length.toLocaleString() + ' substations shown \u00b7 ' +
      '<span style="color:#27ae60">' + low + ' Low</span> \u00b7 ' +
      '<span style="color:#f39c12">' + med + ' Medium</span> \u00b7 ' +
      '<span style="color:#e74c3c">' + high + ' High</span> \u00b7 ' +
      '<span style="color:#8e1b23">' + crit + ' Critical</span>';

    if (filtered.length === 0) return;

    // Compute bounds
    var lats = filtered.map(function(s){return s.lat;});
    var lons = filtered.map(function(s){return s.lon;});
    var minLat = Math.min.apply(null, lats) - 0.5;
    var maxLat = Math.max.apply(null, lats) + 0.5;
    var minLon = Math.min.apply(null, lons) - 0.5;
    var maxLon = Math.max.apply(null, lons) + 0.5;

    var margin = 40;
    var z = _mapState.zoom;

    filtered.forEach(function(s) {
      var x = ((s.lon - minLon) / (maxLon - minLon) * (W - 2*margin) + margin) * z + _mapState.panX;
      var y = (H - ((s.lat - minLat) / (maxLat - minLat) * (H - 2*margin) + margin)) * z + _mapState.panY;
      var val = compF === 'score' ? s.score : (s[compF] || 0);
      var color = scoreColor(val);
      var r = z < 1.5 ? 2 : z < 3 ? 3 : 4;

      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.globalAlpha = 0.65;
      ctx.fill();
      ctx.globalAlpha = 1;
    });

    // 50/60 Hz boundary line (approximate Itoigawa-Shizuoka line)
    ctx.beginPath();
    ctx.setLineDash([6, 4]);
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 1.5;
    var istlLon = 138.0;
    var x50 = ((istlLon - minLon) / (maxLon - minLon) * (W - 2*margin) + margin) * z + _mapState.panX;
    ctx.moveTo(x50, 0);
    ctx.lineTo(x50, H);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#666';
    ctx.font = '10px sans-serif';
    ctx.fillText('50 Hz \u2190', x50 - 50, 20);
    ctx.fillText('\u2192 60 Hz', x50 + 8, 20);
  }

  // Zoom controls
  document.getElementById('zoomIn').onclick = function() { _mapState.zoom *= 1.3; renderMap(); };
  document.getElementById('zoomOut').onclick = function() { _mapState.zoom /= 1.3; renderMap(); };
  document.getElementById('zoomFit').onclick = function() { _mapState.zoom = 1; _mapState.panX = 0; _mapState.panY = 0; renderMap(); };

  // Pan with mouse
  var mapCanvas = document.getElementById('ssi-map-canvas');
  mapCanvas.onmousedown = function(e) { _mapState.dragging = true; _mapState.lastX = e.clientX; _mapState.lastY = e.clientY; mapCanvas.style.cursor = 'grabbing'; };
  window.onmousemove = function(e) {
    if (!_mapState.dragging) return;
    _mapState.panX += e.clientX - _mapState.lastX;
    _mapState.panY += e.clientY - _mapState.lastY;
    _mapState.lastX = e.clientX;
    _mapState.lastY = e.clientY;
    renderMap();
  };
  window.onmouseup = function() { _mapState.dragging = false; mapCanvas.style.cursor = 'grab'; };

  // Scroll zoom
  mapCanvas.onwheel = function(e) {
    e.preventDefault();
    _mapState.zoom *= e.deltaY < 0 ? 1.15 : 0.87;
    _mapState.zoom = Math.max(0.5, Math.min(10, _mapState.zoom));
    renderMap();
  };

  // Tooltip on hover
  mapCanvas.onmousemove = function(e) {
    if (_mapState.dragging || _allSubs.length === 0) return;
    var rect = mapCanvas.getBoundingClientRect();
    var mx = (e.clientX - rect.left) * (mapCanvas.width / rect.width);
    var my = (e.clientY - rect.top) * (mapCanvas.height / rect.height);
    // Find nearest substation
    // (simplified \u2014 in production use spatial index)
    var tooltip = document.getElementById('map-tooltip');
    tooltip.style.display = 'none';
  };

  // Filter event listeners
  ['filter-band','filter-region','filter-voltage','filter-component'].forEach(function(id) {
    document.getElementById(id).onchange = renderMap;
  });
  document.getElementById('filter-search').oninput = renderMap;

  // Load data
  fetch('ssi-data.json?v=1')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      _allSubs = data.substations || data;
      renderMap();
    })
    .catch(function(err) {
      console.error('Map data load error:', err);
      document.getElementById('map-stats').innerHTML = 'Awaiting ssi-data.json \u2014 run scoring pipeline to generate map data.';
    });
</script>
<script>renderFooter();</script>
</body>
</html>
